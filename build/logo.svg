<svg width="600" height="500" viewBox="0 0 600 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <radialGradient id="orangeBg" cx="50%" cy="45%" r="75%">
    <stop offset="0%" stop-color="#f5a832"/>
    <stop offset="100%" stop-color="#d97316"/>
  </radialGradient>
  <radialGradient id="micPink" cx="35%" cy="28%" r="68%">
    <stop offset="0%" stop-color="#f0a0c0"/>
    <stop offset="55%" stop-color="#c060a0"/>
    <stop offset="100%" stop-color="#803070"/>
  </radialGradient>
</defs>

<!-- ORANGE ROUNDED CARD -->
<rect x="0" y="0" width="600" height="500" rx="36" fill="url(#orangeBg)"/>
<rect x="0" y="0" width="600" height="160" rx="36" fill="white" opacity="0.07"/>

<!-- HEART top right -->
<path d="M547,42 C547,33 554,27 562,27 C570,27 577,33 577,42 C577,52 562,64 562,64 C562,64 547,52 547,42Z"
  fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>

<!-- SPEECH BUBBLE black circle -->
<circle cx="262" cy="182" r="130" fill="#111111"/>
<!-- Bubble tail -->
<path d="M332,300 L372,336 L298,308" fill="#111111"/>

<!-- HEADPHONE left ear -->
<rect x="155" y="146" width="28" height="46" rx="14" fill="url(#micPink)"/>
<!-- HEADPHONE right ear -->
<rect x="339" y="146" width="28" height="46" rx="14" fill="url(#micPink)"/>
<!-- HEADPHONE band -->
<path d="M167,163 Q167,90 262,90 Q357,90 357,163"
  fill="none" stroke="#c060a0" stroke-width="20" stroke-linecap="round"/>
<!-- Band highlight -->
<path d="M177,160 Q177,108 262,108 Q347,108 347,160"
  fill="none" stroke="#f0c0d8" stroke-width="5" stroke-linecap="round" opacity="0.35"/>

<!-- MIC body -->
<rect x="234" y="136" width="56" height="86" rx="28" fill="url(#micPink)"/>
<!-- Mic highlight -->
<rect x="243" y="142" width="18" height="32" rx="9" fill="white" opacity="0.28"/>
<!-- Mic grill lines -->
<line x1="235" y1="160" x2="289" y2="160" stroke="#7a2060" stroke-width="2.2" opacity="0.55"/>
<line x1="235" y1="173" x2="289" y2="173" stroke="#7a2060" stroke-width="2.2" opacity="0.55"/>
<line x1="235" y1="186" x2="289" y2="186" stroke="#7a2060" stroke-width="2.2" opacity="0.55"/>
<line x1="235" y1="199" x2="289" y2="199" stroke="#7a2060" stroke-width="2.2" opacity="0.55"/>
<!-- Mic stand -->
<path d="M234,222 Q218,244 218,260 L306,260 Q306,244 290,222"
  fill="none" stroke="#c060a0" stroke-width="6" stroke-linecap="round"/>
<!-- Mic base -->
<rect x="204" y="257" width="116" height="12" rx="6" fill="#c060a0"/>

<!-- UNIFYTALK wordmark -->
<text x="300" y="366"
  text-anchor="middle"
  font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
  font-size="64"
  font-weight="900"
  fill="#1a1a1a"
  letter-spacing="2">UNIFYTALK</text>

<!-- SLOGAN -->
<text x="300" y="422"
  text-anchor="middle"
  font-family="Arial, sans-serif"
  font-size="21"
  font-weight="600"
  fill="#7a3080"
  letter-spacing="2">Every Voice · Every Ability · No Limits</text>

</svg>
